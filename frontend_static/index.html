<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI IT Interview Simulator</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
    <script defer src="app.js"></script>
</head>
<body>
    <div id="app">
        <!-- Screen 1: Welcome -->
        <section id="screen-welcome" class="screen active">
            <h1>Добро пожаловать</h1>
            <p>Сымитируйте IT‑интервью за один клик.</p>
            <button id="start-btn">Начать</button>
        </section>
        <!-- Screen 2: Interview -->
        <section id="screen-interview" class="screen">
            <h2 id="question-title"></h2>
            <textarea id="answer" rows="5" placeholder="Ваш ответ..."></textarea>
            <div class="controls">
                <button id="next-btn">Следующий вопрос</button>
                <span id="lead-status" class="lead">Тимлид в сети…</span>
            </div>
        </section>
        <!-- Screen 3: Results -->
        <section id="screen-result" class="screen">
            <h2>Результат</h2>
            <p id="result-text"></p>
            <button id="premium-btn">Получить премиум за 1990 KZT</button>
        </section>
    </div>
    <div id="premium-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Премиум доступ</h3>
            <p>Откройте неограниченные интервью за 1990 KZT.</p>
            <button id="close-modal">Закрыть</button>
        </div>
    </div>
</body>
</html>
